<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width", initial-scale="1.0" />
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" href="styles.css"? />
</head>

<body>
    <!--********NAVIGATION BAR********-->
    <nav class="navbar"?>
         <ul class="navLinks">
             <li>Home</li>
             <li>My Schedule</li>
             <li>Inbox</li>
             <li>FAQs</li>
             <li>Settings</li>G
         </ul>
    </nav>

    <!--********WELCOME TITLE AND NOTIFICATION SECTION********-->
    <section class="welcomeSection">
        <h1>Welcome, </h1>
        <div class="notficationBanner">
            <span class="notifcation">You have  Notifications! </span>
            <button>Check Inbox</button>
        </div>
    </section>

    <!--*******CONTENT********-->
    <section class="mainContent">

        <!--UPCOMING LESSONS CARD-->
        <div class="upcomingCard">
            <h2>Upcoming Lessons:</h2>

            <!--Lesson 1-->
            <div class="lesson-item">
                <span class="L1">Lesson 1</span>
                <button>View</button>
            </div>

            <!--Lesson 2-->
            <div class="lesson-item">
                <span class="L2">Lesson 2</span>
                <button>View</button>
            </div>

            <!--Lesson 3-->
            <div class="lesson-item">
                <span class="L3">Lesson 3</span>
                <button>View</button>
            </div>

            <!--Lesson 4-->
            <div class="lesson-item">
                <span class="L4">Lesson 4</span>
                <button>View</button>
            </div>
        </div>

        <!--STUDENTS CARD-->
        <div class="studentCard">
            <h2>Students</h2>

            <!--Student 1-->
            <div class="student-item">
                <div class="avatar"></div>
                <span class="S1">Student Name</span>
                <button>View</button>
            </div>

            <!--Student 2-->
            <div class="student-item">
                <div class="avatar"></div>
                <span class="S2">Student Name</span>
                <button>View</button>
            </div>

            <!--Student 3-->
            <div class="student-item">
                <div class="avatar"></div>
                <span class="S3">Student Name</span>
                <button>View</button>
            </div>

            <!--Student 4-->
            <div class="student-item">
                <div class="avatar"></div>
                <span class="S4">Student Name</span>
                <button>View</button>
            </div>
        </div>
    </section>


</body>
</html>
