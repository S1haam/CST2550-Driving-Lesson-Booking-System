<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" , initial-scale="1.0" />
    <title>Inbox</title>
    <link rel="stylesheet" href="styles.css" ? />
</head>
<body>
    <!--********NAVIGATION BAR********-->
    <nav class="navbar" ?>
        <ul class="navLinks">
            <li>Home</li>
            <li>My Schedule</li>
            <li>Inbox</li>
            <li>FAQs</li>
            <li>Settings</li>
        </ul>
    </nav>

    <!--********INBOX CONTENT SECTION********-->
    <section class="welcomeSection">
        <h1>Inbox</h1>
    </section>

    <section class="inboxContent">
        <div class="card inbox-card">

            <!--STARRED, STAR, DELETE BUTTONS-->
            <div class="inbox-tabs">
                <button class="Starred"></button>
                <button class="Star"></button>
                <button class="Delete"></button>
            </div>

            <!--MAIL LIST-->
            <ul class="notification-list">
                <li class="notification-item"></li>
            </ul>
        </div>
    </section>
</body>
</html>
