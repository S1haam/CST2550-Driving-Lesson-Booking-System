<!DOCTYPE html>
<html>
<head>
    <title>Instructor Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>WELCOME TO SER DRIVING SCHOOL</h1>
    <h3>Sign Up: Instructor</h3>

<form method="post" action="http://localhost:5000/Instructor/Register">
    <input type="text" name="InstructorId" placeholder="Instructor's ID" required>
    <input type="text" name="Name" placeholder="Name" required>
    <input type="email" name="Email" placeholder="Email address" required>
    <input type="password" name="Password" placeholder="Password" required>
    <input type="password" name="ConfirmPassword" placeholder="Confirm Password" required>
    <button>Sign Up</button>
  
</form>
    
    <button class="back-btn" onclick="location.href='start.html'">Back</button>
</div>

</body>
</html>
